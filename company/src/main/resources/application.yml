spring:
  application:
    name: company
#  datasource:
#    url: jdbc:h2:mem:testdb
#    username: sa
#    password: ''
#  h2:
#    console:
#      enabled: true
  datasource:
#    url: jdbc:mysql://localhost:3399/companydb
    url: jdbc:mysql://localhost:3306/companydb
    username: root
    password: root
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always

  profiles:
    active: "prod"
  config:
    import: "optional:configserver:http://localhost:8071/"
  rabbitmq:
    host: "localhost"
    port: 5672
    username: guest
    password: guest

server:
  port: 9091

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "company"
    desctiption: "Training Tracker Company Microservice"
    version: "1.0.0"
