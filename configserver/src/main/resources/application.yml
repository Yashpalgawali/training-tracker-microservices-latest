server:
  port: 8071

spring:
  application:
    name: "configserver"
  profiles:
#    active: "native"
    active: "git"
  cloud:
    config:
      server:
#        native:
#          search-locations: "classpath:/config"
#          search-locations: "file:///E://training tracker microservice config//config"
         git:
           uri: "https://github.com/Yashpalgawali/training-tracker-microservice-config.git"
           default-label: main
           timeout: 5
           clone-on-start: true
           force-pull: true
  rabbitmq:
    host: "localhost"
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

encrypt:
  key: "qr&9VZHOJu0*9$B1"
