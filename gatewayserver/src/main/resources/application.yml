spring:
  application:
    name: gatewayserver
  config:
    import: "optional:configserver:http://localhost:8071/"
  cloud:
    gateway:
      discovery:
        locator:
#          enabled: true
          enabled: false
          lower-case-service-id: true
          

  rabbitmq:
    host: "localhost"
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true

info:
  app:
    name: "Gatewayserver"
    desctiption: "Training Tracker Gatewayserver Microservice"
    version: "1.0.0"

logging:
  level:
    com:
      example:
        gatewayserver: debug