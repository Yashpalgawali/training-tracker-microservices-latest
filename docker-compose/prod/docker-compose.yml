#      service: microservice-eureka-config


  department:
    image: "yashpalgawali/department:s1"
    container_name: department-ms
    ports:
      - "9092:9092"
    depends_on:
      eurekaserver:
        condition: service_healthy
      departmentdb:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:9092/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 25
      start_period: 15s
    environment:
      SPRING_APPLICATION_NAME: "department"
      SPRING_DATASOURCE_URL: "jdbc:mysql://departmentdb:3306/departmentdb"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

