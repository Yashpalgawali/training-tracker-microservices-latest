  gatewayserver:
    image: "yashpalgawali/gatewayserver:s1"
    container_name: gatewayserver-ms
    ports:
      - "8072:8072"
    depends_on:
      company:
        condition: service_healthy
      department:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

